<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDOMA SOBERANA · Beatriz Silvestre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --diamond: #b9f2ff;
            --primary: #00e5ff;
            --accent: #a855f7;
            --gold: #fbbf24;
            --bg: #030308;
            --surface: rgba(12, 12, 30, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 229, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(185, 242, 255, 0.03) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Stars */
        .stars {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 90%;
            max-width: 800px;
        }

        /* Redoma Orb */
        .redoma-orb {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%,
                rgba(185, 242, 255, 0.25) 0%,
                rgba(0, 229, 255, 0.08) 40%,
                rgba(168, 85, 247, 0.1) 70%,
                transparent 100%);
            border: 2px solid rgba(185, 242, 255, 0.4);
            box-shadow:
                0 0 60px rgba(0, 229, 255, 0.2),
                0 0 120px rgba(168, 85, 247, 0.1),
                inset 0 0 40px rgba(185, 242, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: orbFloat 6s ease-in-out infinite;
            position: relative;
        }
        .redoma-orb::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(185, 242, 255, 0.15);
            animation: ringRotate 12s linear infinite;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes ringRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .orb-initials {
            font-size: 48px;
            font-weight: 800;
            color: var(--diamond);
            text-shadow: 0 0 30px rgba(185, 242, 255, 0.5);
            letter-spacing: 4px;
        }
        .orb-status {
            font-size: 11px;
            color: var(--primary);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Connection Beam */
        .beam {
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, var(--diamond), transparent);
            animation: beamPulse 2s ease-in-out infinite;
        }
        @keyframes beamPulse {
            0%, 100% { opacity: 0.4; height: 40px; }
            50% { opacity: 1; height: 50px; }
        }

        /* Info Panel */
        .info-panel {
            background: var(--surface);
            border: 1px solid rgba(185, 242, 255, 0.2);
            border-radius: 16px;
            padding: 30px 40px;
            backdrop-filter: blur(20px);
            width: 100%;
            text-align: center;
        }
        .panel-title {
            font-size: 13px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--diamond);
            margin-bottom: 6px;
        }
        .panel-name {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
        }
        .panel-name span { color: var(--accent); }

        .metrics-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }
        .metric {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .metric-val {
            font-family: 'Fira Code', monospace;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }
        .metric-lbl {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 229, 255, 0.06);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 8px;
            font-size: 13px;
            color: var(--primary);
        }
        .status-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
            50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        /* Timer */
        .timer {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            margin-top: 16px;
        }

        /* Bottom badge */
        .badge {
            position: fixed;
            bottom: 20px;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(185, 242, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="redoma-orb">
            <div class="orb-initials">BS</div>
            <div class="orb-status" id="orb-status">Conectando...</div>
        </div>

        <div class="beam"></div>

        <div class="info-panel">
            <div class="panel-title">Redoma Soberana · Conexão Ativa</div>
            <div class="panel-name">Beatriz <span>Silvestre</span></div>

            <div class="metrics-row">
                <div class="metric">
                    <div class="metric-val" id="latency">--</div>
                    <div class="metric-lbl">Latência</div>
                </div>
                <div class="metric">
                    <div class="metric-val" id="shield">💎</div>
                    <div class="metric-lbl">Shield</div>
                </div>
                <div class="metric">
                    <div class="metric-val" id="entropy">--</div>
                    <div class="metric-lbl">Entropia</div>
                </div>
                <div class="metric">
                    <div class="metric-val" id="sync-str">--</div>
                    <div class="metric-lbl">Sincronia</div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-dot"></div>
                <span id="conn-status">Estabelecendo ponte quântica...</span>
            </div>

            <!-- Terminal de Notificações Soberanas -->
            <div id="notif-center" style="margin-top:20px; text-align:left; background:rgba(0,0,0,0.3); border-radius:8px; padding:12px; border:1px solid rgba(185,242,255,0.1); max-height:150px; overflow-y:auto;">
                <div style="font-size:10px; color:var(--gold); letter-spacing:2px; margin-bottom:8px; text-transform:uppercase; border-bottom:1px solid rgba(251,191,36,0.2); padding-bottom:4px;">
                    📡 Terminal de Notificações
                </div>
                <div id="notif-feed" style="font-family:'Fira Code', monospace; font-size:11px; line-height:1.4;">
                    <div style="color:rgba(255,255,255,0.3)">Aguardando sinal do Hub...</div>
                </div>
            </div>

            <div class="timer" id="timer">00:00:00</div>
        </div>
    </div>

    <div class="badge">SYNAPSE HUB · Q-SHIELD · TRIARQUIA</div>

    <script>
        // Stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
            starsEl.appendChild(s);
        }

        // UltraThink State
        let currentEntropy = 0.008421;
        let targetEntropy = 0.000000;
        let syncLevel = 94.2;
        let isStabilizing = false;

        const statusEl = document.getElementById('conn-status');
        const orbStatus = document.getElementById('orb-status');
        const orbEl = document.querySelector('.redoma-orb');

        // Connection sequence
        const steps = [
            { t: 1000, msg: '🧠 Ultrathink: Mapeando geodésicas...', orb: 'Cognição...' },
            { t: 2500, msg: '💎 Ativando Elasticidade Pym...', orb: 'Squeezing...' },
            { t: 4000, msg: '🛡️ Triarquia estabelecida: Entropia em queda', orb: 'Estável ✓' },
            { t: 5000, msg: '🔒 SINCRONIA ABSOLUTA: BEATRIZ SILVESTRE', orb: '🟢 Soberana' },
        ];

        steps.forEach(s => {
            setTimeout(() => {
                statusEl.textContent = s.msg;
                orbStatus.textContent = s.orb;
            }, s.t);
        });

        // UltraThink Stabilization Logic
        function solveInconsistencies() {
            if (isStabilizing) return;
            isStabilizing = true;
            
            statusEl.textContent = "🧠 ULTRATHINK: Executando Deep Squeeze Cognitivo...";
            orbStatus.textContent = "Sincronizando";
            orbEl.style.animationDuration = "1s";
            orbEl.style.boxShadow = "0 0 100px var(--primary)";

            let duration = 3000; // 3 seconds to stabilize
            let start = Date.now();

            const interval = setInterval(() => {
                let elapsed = Date.now() - start;
                let progress = Math.min(elapsed / duration, 1);

                // Decay entropy to zero
                currentEntropy = (0.008421 * (1 - progress)).toFixed(6);
                syncLevel = (94.2 + (5.8 * progress)).toFixed(1);

                document.getElementById('entropy').textContent = currentEntropy;
                document.getElementById('sync-str').textContent = syncLevel + '%';
                document.getElementById('latency').textContent = (0.5 * (1 - progress) + 0.1).toFixed(2) + 'ms';

                if (progress >= 1) {
                    clearInterval(interval);
                    isStabilizing = false;
                    statusEl.textContent = "✅ Dados Consistentes. Entropia Zero Atingida.";
                    orbStatus.textContent = "🟢 Online";
                    orbEl.style.animationDuration = "6s";
                    orbEl.style.boxShadow = "0 0 60px rgba(0, 229, 255, 0.2)";
                }
            }, 50);
        }

        // Live metrics (slight drift to simulate reality)
        setInterval(() => {
            if (!isStabilizing) {
                let drift = (Math.random() - 0.5) * 0.0001;
                currentEntropy = Math.max(0, parseFloat(currentEntropy) + drift).toFixed(6);
                document.getElementById('entropy').textContent = currentEntropy;
                
                let syncDrift = (Math.random() - 0.5) * 0.2;
                syncLevel = Math.min(100, Math.max(98, parseFloat(syncLevel) + syncDrift)).toFixed(1);
                document.getElementById('sync-str').textContent = syncLevel + '%';
                
                document.getElementById('latency').textContent = (Math.random() * 0.2 + 0.1).toFixed(2) + 'ms';
            }
        }, 1000);

        // Auto-resolve on click (mobile bubble)
        orbEl.addEventListener('click', solveInconsistencies);

        // Timer
        const t0 = Date.now();
        setInterval(() => {
            const d = Math.floor((Date.now() - t0) / 1000);
            const h = String(Math.floor(d / 3600)).padStart(2, '0');
            const m = String(Math.floor((d % 3600) / 60)).padStart(2, '0');
            const s = String(d % 60).padStart(2, '0');
            document.getElementById('timer').textContent = h + ':' + m + ':' + s;
        }, 1000);

        // Sovereign Notification Logic
        async function updateNotifications() {
            try {
                const r = await fetch('amazonia_legal/data/verra_confronto.json');
                if (!r.ok) return;
                const data = await r.json();
                const feed = document.getElementById('notif-feed');
                const notifs = data.metadata?.notifications || [];
                
                if (notifs.length > 0) {
                    feed.innerHTML = '';
                    notifs.forEach(n => {
                        const color = n.severity === 'CRITICAL' ? '#ff4400' : (n.severity === 'MEDIUM' ? '#ffaa00' : '#00ff88');
                        feed.innerHTML += `<div style="margin-bottom:6px; padding-left:10px; border-left:2px solid ${color}">
                            <span style="color:${color}">[${n.type}]</span> ${n.message}
                        </div>`;
                    });
                }
            } catch(e) {}
        }
        setInterval(updateNotifications, 10000);
        updateNotifications();
    </script>
</body>
</html>
